# melpazoid <https://github.com/riscy/melpazoid> build checks.

# If your package is on GitHub, enable melpazoid's checks by copying this file
# to .github/workflows/melpazoid.yml and modifying RECIPE and EXIST_OK below.
---
name: melpazoid
'on': [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - 29.1
          # - 29.2
          # - 29.3
          - 29.4
          # - 30.1
          - 30.2
          # - release-snapshot
    steps:
      - name: Get repo to access in conteiner
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Emacs
        uses: purcell/setup-emacs@v8.0
        with:
          version: ${{ matrix.emacs_version }}

      - name: Test1
        run: |
         emacs -Q --batch --no-site-file -l org-history-debug.el -l org-history-outline.el -l org-history-dirl.el -l org-history.el -l org-history-test.el -f ert-run-tests-batch-and-exit
      - name: Test2
        run: |
         emacs -Q --batch --no-site-file -l org-history-debug.el -l org-history-outline.el -l org-history-outline-test.el -f ert-run-tests-batch-and-exit
      - name: Test3
        run: |
         emacs -Q --batch --no-site-file -l org-history-debug.el -l org-history-dirl.el -l org-history-dirl-test.el -f ert-run-tests-batch-and-exit


      - name: Install package-lint (Emacs)
        run: |
          emacs -Q --batch \
            --eval "(progn \
                    (require 'package) \
                    (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t) \
                    (package-initialize) \
                    (unless (package-installed-p 'package-lint) \
                      (progn \
                        (package-refresh-contents) \
                        (package-install 'package-lint))))"

      - name: Install Eask
        uses: emacs-eask/setup-eask@master
        with:
          version: 'snapshot'

      - name: Run Checkdoc
        run: |
          echo -e "Eask: Run checkdoc.."
          eask --strict lint checkdoc -g 2>&1

      - name: Run lint
        run: |
          echo -e "Eask: Run package-lint.."
          eask -g --verbose 5 --strict --allow-error lint package 2>&1 |& tee output.log # always exit with 1 error code
          if grep -q '[0-9] issue found:' output.log ; then
            echo "Error detected, failing workflow" ; exit 1
          fi

      - name: Set up Python 3.12 for melpazoid
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install melpazoid
        run: |
          python -m pip install --upgrade pip
          # sudo apt-get install emacs-nox && emacs --version
          git clone https://github.com/riscy/melpazoid.git ~/melpazoid
          pip install ~/melpazoid


      - name: Run
        env:
          LOCAL_REPO: ${{ github.workspace }}
          # RECIPE is your recipe as written for MELPA:
          RECIPE: (org-history :fetcher github :repo "Anoncheg1/emacs-org-history")
          # set this to false (or remove it) if the package isn't on MELPA:
          EXIST_OK: true
        run: |
          echo $GITHUB_REF
          make -C ~/melpazoid |& tee output.log
          make_exit=${PIPESTATUS[0]}
          [ $make_exit -ne 0 ] && { echo "Make command failed, failing workflow"; exit 1; }
          if grep -q "Warning" output.log ; then
            echo "Warnings detected, failing workflow" ; exit 1
          fi
          if grep -q ': error: ' output.log ; then
            echo "Error detected, failing workflow" ; exit 1
          fi
          if grep -q ' with [melpazoid]' output.log ; then
            echo "Melpazoid warning detected, failing workflow" ; exit 1
          fi
          if grep -q ' with package-lint ' output.log ; then
            echo "Checkdoc warning detected, failing workflow" ; exit 1
          fi
          if grep -q ' with checkdoc ' output.log ; then
            echo "Checkdoc warning detected, failing workflow" ; exit 1
          fi
